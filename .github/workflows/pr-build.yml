name: PR Build

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Run Android lint
        shell: bash
        run: |
          bash ./gradlew --no-daemon lintDebug -Dorg.gradle.java.home="${JAVA_HOME}"

      - name: Run unit tests
        shell: bash
        run: |
          bash ./gradlew --no-daemon testDebugUnitTest -Dorg.gradle.java.home="${JAVA_HOME}"

      - name: Build debug app
        shell: bash
        run: |
          bash ./gradlew --no-daemon assembleDebug -Dorg.gradle.java.home="${JAVA_HOME}"
