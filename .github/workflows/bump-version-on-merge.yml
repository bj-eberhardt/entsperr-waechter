name: Bump Version On Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: bump-version-master
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versionCode and patch version
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("app/build.gradle.kts")
          text = path.read_text(encoding="utf-8")

          version_code_match = re.search(r"versionCode = (\d+)", text)
          version_name_match = re.search(r'versionName = "(\d+)\.(\d+)\.(\d+)"', text)

          if not version_code_match or not version_name_match:
              raise SystemExit("Could not find versionCode/versionName in app/build.gradle.kts")

          new_version_code = int(version_code_match.group(1)) + 1
          major, minor, patch = map(int, version_name_match.groups())
          new_version_name = f"{major}.{minor}.{patch + 1}"

          text = re.sub(r"versionCode = \d+", f"versionCode = {new_version_code}", text, count=1)
          text = re.sub(r'versionName = "\d+\.\d+\.\d+"', f'versionName = "{new_version_name}"', text, count=1)

          path.write_text(text, encoding="utf-8")

          print(f"versionCode -> {new_version_code}")
          print(f"versionName -> {new_version_name}")
          Path(".bumped-version-name").write_text(new_version_name, encoding="utf-8")
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          VERSION_NAME="$(cat .bumped-version-name)"
          TAG_NAME="v${VERSION_NAME}"
          git add app/build.gradle.kts
          if git diff --cached --quiet; then
            echo "No version changes detected."
            exit 0
          fi
          git commit -m "ci: bump app version after merge [skip ci]"
          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists locally."
            exit 1
          fi
          git tag "${TAG_NAME}"
          git push origin HEAD:master
          git push origin "${TAG_NAME}"
